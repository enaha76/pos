name: Build Windows desktop app

# Builds the Caisse Windows installer (.msi + .exe) on every push and on demand,
# then publishes it to a GitHub Release (tagged by the app version) so the client
# has a permanent download link: https://github.com/enaha76/pos/releases/latest
on:
  push:
    branches: [main]
  workflow_dispatch:

# Needed so the workflow can create/update the Release and its tag.
permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        id: ver
        shell: bash
        run: echo "version=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> "$GITHUB_OUTPUT"

      - name: Generate app icons (from public/favicon.svg)
        run: |
          npm i -D sharp
          node -e "require('sharp')('public/favicon.svg').resize(1024,1024).png().toFile('app-icon.png').then(()=>console.log('icon generated'))"
          npx tauri icon app-icon.png

      - name: Build desktop app
        run: npx tauri build

      - name: Upload installers (build artifact)
        uses: actions/upload-artifact@v4
        with:
          name: caisse-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Caisse v${{ steps.ver.outputs.version }} — Café Adalya
          body: |
            **Caisse** — caisse enregistreuse pour Café Adalya (Windows, hors-ligne).

            ### Installation
            Téléchargez et lancez **`Caisse_${{ steps.ver.outputs.version }}_x64-setup.exe`** (recommandé),
            ou le fichier `.msi`. L'application s'installe et fonctionne sans internet.

            ### Connexion
            - Caissier — code **1111**
            - Propriétaire — code **9999**

            > Les codes sont modifiables dans l'app (Propriétaire → Utilisateurs).
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          fail_on_unmatched_files: true
