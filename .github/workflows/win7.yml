name: Build Windows 7 desktop app (Slint)

# Native Win7 build (Slint + embedded SQLite, no WebView2). Uses current nightly
# Rust with the tier-3 x86_64-win7-windows-msvc target (std built from source),
# so modern crates compile and the .exe still runs on Windows 7.
on:
  push:
    branches: [main]
    paths:
      - "win7/**"
      - "src-tauri/migrations/**"
      - ".github/workflows/win7.yml"
  workflow_dispatch:

jobs:
  win7:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: win7
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + std source
        shell: bash
        run: |
          rustup toolchain install nightly --profile minimal --no-self-update
          rustup component add rust-src --toolchain nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: win7

      - name: Build (release, Windows 7 target)
        run: cargo +nightly build --release

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: caisse-win7
          path: win7/target/x86_64-win7-windows-msvc/release/caisse-win7.exe
          if-no-files-found: error
