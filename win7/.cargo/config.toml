# Build for the tier-3 Windows 7 target, compiling std from source so we can use
# a current Rust toolchain (needed by modern crates) while still running on Win7.
[build]
target = "x86_64-win7-windows-msvc"

[unstable]
build-std = ["std", "panic_abort"]

# Static CRT → self-contained .exe, no VC++ redistributable needed on Windows 7.
[target.x86_64-win7-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
