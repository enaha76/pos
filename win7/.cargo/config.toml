# Static CRT for the Windows 7 target only → self-contained .exe, no VC++
# redistributable. This block applies ONLY when building for that target, so
# native host builds (e.g. Linux for local testing) are unaffected.
#
# The Win7 target selection + build-std live in the CI command line
# (.github/workflows/win7.yml), not here, so `cargo run` on Linux/Windows
# builds natively for quick local testing.
[target.x86_64-win7-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
